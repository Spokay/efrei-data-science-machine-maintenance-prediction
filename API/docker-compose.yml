services:
  api:
    build:
      context: .
      tags:
        - registry.spokayhub.top/efrei-prediction-defaillance:latest
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    environment:
      - MODEL_PATH=/app/models/XGBoost.pkl
      - ALLOWED_ORIGINS=*
    restart: unless-stopped
